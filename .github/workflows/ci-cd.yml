name: CI-CD flask docker

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:latest   .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

      - name: Run container for test
        run: |
          docker run -d -p 5050:5050 --name test-container ${{ secrets.DOCKER_USERNAME }}/flask-app:latest
          sleep 10
          docker ps
          docker logs test-container

      - name: Test app endpoint
        run: curl http://localhost:5050

      - name: Stop container
        run: docker stop test-container
