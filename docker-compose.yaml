version: '3.8'

services:

  mysql:
    image: mysql:8.0

    container_name: mysql-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mydb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

  flask-app:
    build: .

    container_name: flask-app

    depends_on:
      - mysql

    ports:
      - "5050:5050"

    environment:
      DB_HOST: mysql
      DB_USER: admin
      DB_PASS: admin123
      DB_NAME: mydb

volumes:
  mysql-data: