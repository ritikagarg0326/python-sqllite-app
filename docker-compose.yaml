version: '3.8'

services:

  mysql:
    image: mysql:8.0.43
    container_name: mysql-db

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mydb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - monitoring

  flask-app:
    build: .

    container_name: flask-app

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "5050:5050"

    environment:
      DB_HOST: mysql
      DB_USER: admin
      DB_PASS: admin123
      DB_NAME: mydb

    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v3.4.1

    container_name: prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

    depends_on:
      - flask-app

    networks:
      - monitoring

  grafana:
    image: grafana/grafana:12.1.1

    container_name: grafana

    restart: unless-stopped

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

    volumes:
      - grafana-data:/var/lib/grafana

    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:v1.9.1

    container_name: node-exporter

    restart: unless-stopped

    ports:
      - "9100:9100"

    networks:
      - monitoring

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:

networks:
  monitoring:
    driver: bridge