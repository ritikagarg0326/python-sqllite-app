<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="container">
    <h1>Add User Management</h1>
    <p class="lead">A simple Flask + MySQL (AWS RDS) app to add and delete users.</p>

    {% if users %}
    <ul class="users">
      {% for user in users %}
      <li class="user-item">
        <div class="user-info">
          
          <!-- ✅ Name -->
          <span class="name">{{ user.name }}</span>

          <!-- ✅ MySQL ID -->
          <span class="id">#{{ user.id }}</span>
        </div>

        <!-- ✅ FIXED: use id (not _id) -->
        <form action="/delete/{{ user.id }}" method="POST" class="delete-form">
          <button type="submit" class="btn delete-btn"
            onclick="return confirm('Are you sure you want to delete this user?');">
            Delete
          </button>
        </form>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="lead">No users found. Add one below!</p>
    {% endif %}

    <!-- ➕ Add User -->
    <form action="/add" method="POST" class="form-row">
      <input type="text" name="name" placeholder="Enter name..." required>
      <button type="submit" class="btn">Add User</button>
    </form>

    <div class="footer">
      <p>Powered by Flask & AWS RDS MySQL 🚀</p>
    </div>
  </div>
</body>

</html>
